# Название приложения
spring.application.name=geo-server

# Подключение к PostgreSQL 16
spring.datasource.url=jdbc:postgresql://localhost:5431/geo_app
spring.datasource.username=admin
spring.datasource.password=secret123
spring.datasource.driver-class-name=org.postgresql.Driver

# Настройки JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update     
spring.jpa.show-sql=true                      
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
org.hibernate.envers.store_data_at_delete=true
spring.jpa.properties.org.hibernate.envers.store_data_at_delete=true

# Сервер теперь слушает ВСЮ локальную сеть (не только localhost)
server.address=0.0.0.0
server.port=8081

# Настройки JWT 
jwt.secret=VGhpc0lzQVN1cGVyTG9uZ1NlY3JldEtlRm9ySlhUQnJvamVjdEdob3N0QQ==
jwt.expiration=604800000                       

# отключаем предупреждение open-in-view 
spring.jpa.open-in-view=false

# Настройки резервного копирования (значения по умолчанию)
backup.directory=./backups
spring.config.import=optional:classpath:path.properties

backup.pg-dump-path=C:/Program Files/PostgreSQL/16/bin/pg_dump.exe